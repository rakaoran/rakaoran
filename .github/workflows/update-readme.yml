name: update-readme

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render profile metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: rakaoran
        run: python3 scripts/update_readme_metrics.py

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update profile metrics"
          git push
